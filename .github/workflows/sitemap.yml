name: Update sitemap

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    # skip draft PRs and those opened by bots
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Generate sitemap
        id: sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://emanuele.codes/
          path-to-root: dist

      - name: Log stats
        run: |
          echo "Included URLs: ${{ steps.sitemap.outputs.url-count }}"

      - name: Commit to current branch
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "[action] update sitemap.xml"
          file_pattern: "dist/sitemap.xml"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
